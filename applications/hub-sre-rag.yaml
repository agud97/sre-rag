apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-sre-rag
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/agud97/sre-rag.git
    targetRevision: HEAD
    path: overlays/hub
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: s3-credentials
      jsonPointers: [/data, /stringData]
    - group: ""
      kind: Secret
      name: s3-credentials-normalizer
      jsonPointers: [/data, /stringData]
