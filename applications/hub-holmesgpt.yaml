apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: holmesgpt
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://robusta-charts.storage.googleapis.com
    chart: holmes
    targetRevision: "0.19.0"
    helm:
      values: |
        additionalEnvVars:
          - name: MODEL
            value: "openai/minimax-m25"
          - name: OPENAI_API_BASE
            value: "http://89.111.168.161:32080/v1"
          - name: OPENAI_API_KEY
            value: "6eedf0a5927e06569b11d6c51c29d950da4a69d0f7061ac8"
          - name: AWS_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_ENDPOINT
          - name: S3_BUCKET
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_BUCKET
          - name: S3_REGION
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_REGION
          - name: S3_VERIFY_SSL
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_VERIFY_SSL
          - name: QDRANT_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: QDRANT_ENDPOINT
          - name: EMBEDDING_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: EMBEDDING_ENDPOINT
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: s3-credentials-normalizer
                key: accessKeyId
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: s3-credentials-normalizer
                key: secretAccessKey
        toolsets:
          kubernetes/core:
            enabled: true
          kubernetes/logs:
            enabled: true
          kb/stack:
            enabled: true
            description: Search and fetch SRE RAG knowledge base documents from Qdrant and S3.
            llm_instructions: |
              Use this toolset for knowledge-base retrieval against the SRE RAG store.
              Use `kb_search` to find relevant stored findings, artifact keys, or normalized documents for a cluster.
              Use `kb_fetch` only after `kb_search` when you need the contents of a specific raw or normalized object by key.
              Prefer this toolset over live-cluster investigation when the user asks about stored findings, artifact keys, hub/spoke results, or SRE RAG knowledge-base contents.
            tools:
              - name: kb_search
                description: Search normalized SRE knowledge base documents in Qdrant
                user_description: Search SRE knowledge base documents and return matching stored findings or artifact keys
                parameters:
                  query:
                    description: Search query for the SRE knowledge base
                    type: string
                    required: true
                  limit:
                    description: Maximum number of matches to return
                    type: integer
                    required: true
                  cluster_id:
                    description: Cluster identifier to search, for example hub or spoke-a
                    type: string
                    required: true
                command: python3 /kb-scripts/kb_tools.py search '{{ query }}' '{{ limit }}' '{{ cluster_id }}'
              - name: kb_fetch
                description: Fetch a raw or normalized object from S3 by key
                user_description: Fetch the contents of a known S3 object key from the SRE knowledge base
                parameters:
                  path:
                    description: Exact S3 object key to fetch from the SRE knowledge base
                    type: string
                    required: true
                command: python3 /kb-scripts/kb_tools.py fetch '{{ path }}'
          runbook:
            enabled: true
          bash:
            enabled: true
            config:
              include_default_allow_deny_list: true
        additionalVolumes:
          - name: custom-runbooks
            configMap:
              name: custom-runbooks
          - name: sre-runbooks
            configMap:
              name: sre-runbooks
          - name: kb-stack-toolset
            configMap:
              name: kb-stack-toolset
        additionalVolumeMounts:
          - name: custom-runbooks
            mountPath: /app/holmes/plugins/runbooks/custom-runbooks.yaml
            subPath: custom-runbooks.yaml
          - name: sre-runbooks
            mountPath: /app/holmes/plugins/runbooks/sre-runbooks.yaml
            subPath: sre-runbooks.yaml
          - name: kb-stack-toolset
            mountPath: /kb-scripts/kb_tools.py
            subPath: kb_tools.py
        resources:
          requests:
            memory: "2048Mi"
            cpu: "500m"
          limits:
            memory: "4096Mi"
            cpu: "2000m"
        tolerations:
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: holmesgpt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
