apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: holmesgpt
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://robusta-charts.storage.googleapis.com
    chart: holmes
    targetRevision: "0.19.0"
    helm:
      values: |
        additionalEnvVars:
          - name: MODEL
            value: "openai/minimax-m25"
          - name: OPENAI_API_BASE
            value: "http://89.111.168.161:32080/v1"
          - name: OPENAI_API_KEY
            value: "6eedf0a5927e06569b11d6c51c29d950da4a69d0f7061ac8"
          - name: AWS_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_ENDPOINT
          - name: S3_BUCKET
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_BUCKET
          - name: S3_REGION
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_REGION
          - name: S3_VERIFY_SSL
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: S3_VERIFY_SSL
          - name: QDRANT_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: QDRANT_ENDPOINT
          - name: EMBEDDING_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: sre-rag-config
                key: EMBEDDING_ENDPOINT
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: s3-credentials-normalizer
                key: accessKeyId
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: s3-credentials-normalizer
                key: secretAccessKey
        toolsets:
          kubernetes/core:
            enabled: true
          kubernetes/logs:
            enabled: true
          runbook:
            enabled: true
          bash:
            enabled: true
            config:
              include_default_allow_deny_list: true
        additionalVolumes:
          - name: custom-runbooks
            configMap:
              name: custom-runbooks
          - name: sre-runbooks
            configMap:
              name: sre-runbooks
          - name: kb-stack-toolset
            configMap:
              name: kb-stack-toolset
        additionalVolumeMounts:
          - name: custom-runbooks
            mountPath: /app/holmes/plugins/runbooks/custom-runbooks.yaml
            subPath: custom-runbooks.yaml
          - name: sre-runbooks
            mountPath: /app/holmes/plugins/runbooks/sre-runbooks.yaml
            subPath: sre-runbooks.yaml
          - name: kb-stack-toolset
            mountPath: /app/holmes/plugins/toolsets/kb-stack-toolset.yaml
            subPath: kb-stack-toolset.yaml
          - name: kb-stack-toolset
            mountPath: /kb-scripts/kb_tools.py
            subPath: kb_tools.py
        resources:
          requests:
            memory: "2048Mi"
            cpu: "500m"
          limits:
            memory: "4096Mi"
            cpu: "2000m"
        tolerations:
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: holmesgpt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
