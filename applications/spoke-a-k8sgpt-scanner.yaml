apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spoke-a-k8sgpt-scanner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/agud97/sre-rag.git
    targetRevision: HEAD
    path: base/k8sgpt-scanner
  destination:
    server: https://kubernetes.default.svc
    namespace: k8sgpt-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
