{
  "apiVersion": "argoproj.io/v1alpha1",
  "kind": "Application",
  "metadata": {
    "name": "crossplane",
    "namespace": "argocd"
  },
  "spec": {
    "destination": {
      "namespace": "crossplane-system",
      "server": "https://kubernetes.default.svc"
    },
    "project": "default",
    "source": {
      "chart": "crossplane",
      "helm": {
        "values": "args:\n  - --enable-external-secret-stores\n"
      },
      "repoURL": "https://charts.crossplane.io/stable",
      "targetRevision": "1.15.0"
    },
    "syncPolicy": {
      "automated": {
        "prune": true,
        "selfHeal": true
      },
      "syncOptions": [
        "CreateNamespace=true"
      ]
    }
  }
}
