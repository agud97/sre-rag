{
  "apiVersion": "argoproj.io/v1alpha1",
  "kind": "Application",
  "metadata": {
    "name": "crossplane-provider-kubernetes",
    "namespace": "argocd"
  },
  "spec": {
    "destination": {
      "namespace": "crossplane-system",
      "server": "https://kubernetes.default.svc"
    },
    "project": "default",
    "source": {
      "path": "legacy-src/crossplane/providers",
      "repoURL": "https://github.com/agud97/sre-rag.git",
      "targetRevision": "HEAD"
    },
    "syncPolicy": {
      "automated": {
        "prune": true,
        "selfHeal": true
      }
    }
  }
}
