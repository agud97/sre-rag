{
  "apiVersion": "argoproj.io/v1alpha1",
  "kind": "Application",
  "metadata": {
    "name": "victoria-logs-collector",
    "namespace": "argocd"
  },
  "spec": {
    "destination": {
      "namespace": "victorialogs",
      "server": "https://kubernetes.default.svc"
    },
    "project": "default",
    "source": {
      "chart": "victoria-logs-collector",
      "helm": {
        "values": "remoteWrite:\n  - url: \"http://victoria-logs-victoria-logs-single-server.victorialogs.svc:9428\"\n"
      },
      "repoURL": "https://victoriametrics.github.io/helm-charts",
      "targetRevision": "0.2.9"
    },
    "syncPolicy": {
      "automated": {
        "prune": true,
        "selfHeal": true
      },
      "syncOptions": [
        "CreateNamespace=true"
      ]
    }
  }
}
