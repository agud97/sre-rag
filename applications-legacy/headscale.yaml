{
  "apiVersion": "argoproj.io/v1alpha1",
  "kind": "Application",
  "metadata": {
    "name": "headscale",
    "namespace": "argocd"
  },
  "spec": {
    "destination": {
      "namespace": "headscale",
      "server": "https://kubernetes.default.svc"
    },
    "project": "default",
    "source": {
      "path": "legacy-src/platform/headscale",
      "repoURL": "https://github.com/agud97/sre-rag.git",
      "targetRevision": "HEAD"
    },
    "syncPolicy": {
      "automated": {
        "prune": true,
        "selfHeal": true
      },
      "syncOptions": [
        "CreateNamespace=true"
      ]
    }
  }
}
