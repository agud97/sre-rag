{
  "apiVersion": "argoproj.io/v1alpha1",
  "kind": "Application",
  "metadata": {
    "name": "vm-k8s-stack",
    "namespace": "argocd"
  },
  "spec": {
    "destination": {
      "namespace": "monitoring",
      "server": "https://kubernetes.default.svc"
    },
    "ignoreDifferences": [
      {
        "group": "operator.victoriametrics.com",
        "jsonPointers": [
          "/spec/storage"
        ],
        "kind": "VMSingle"
      },
      {
        "group": "operator.victoriametrics.com",
        "jsonPointers": [
          "/spec/storage"
        ],
        "kind": "VMAlertmanager"
      }
    ],
    "project": "default",
    "source": {
      "chart": "victoria-metrics-k8s-stack",
      "helm": {
        "values": "# VMSingle - хранилище метрик\nvmsingle:\n  enabled: true\n  spec:\n    retentionPeriod: \"15d\"\n    storage:\n      storageClassName: openebs-hostpath\n      resources:\n        requests:\n          storage: 50Gi\n    resources:\n      requests:\n        cpu: 200m\n        memory: 512Mi\n      limits:\n        memory: 2Gi\n\n# VMAgent - сбор метрик\nvmagent:\n  enabled: true\n  spec:\n    resources:\n      requests:\n        cpu: 100m\n        memory: 256Mi\n      limits:\n        memory: 512Mi\n\n# VMAlert - алертинг\nvmalert:\n  enabled: true\n\n# VMAlertmanager\nalertmanager:\n  enabled: true\n  spec:\n    storage:\n      volumeClaimTemplate:\n        spec:\n          storageClassName: openebs-hostpath\n          resources:\n            requests:\n              storage: 5Gi\n\n# Grafana\ngrafana:\n  enabled: true\n  adminPassword: \"admin\"\n  persistence:\n    enabled: true\n    storageClassName: openebs-hostpath\n    size: 5Gi\n  sidecar:\n    datasources:\n      enabled: true\n    dashboards:\n      enabled: true\n  plugins:\n    - victoriametrics-metrics-datasource\n\ndefaultRules:\n  create: true\n\nvictoria-metrics-operator:\n  enabled: true\n"
      },
      "repoURL": "https://victoriametrics.github.io/helm-charts",
      "targetRevision": "0.45.0"
    },
    "syncPolicy": {
      "automated": {
        "prune": true,
        "selfHeal": true
      },
      "syncOptions": [
        "CreateNamespace=true",
        "ServerSideApply=true",
        "RespectIgnoreDifferences=true"
      ]
    }
  }
}
