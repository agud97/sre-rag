{
  "apiVersion": "argoproj.io/v1alpha1",
  "kind": "Application",
  "metadata": {
    "name": "backstage",
    "namespace": "argocd"
  },
  "spec": {
    "destination": {
      "namespace": "backstage",
      "server": "https://kubernetes.default.svc"
    },
    "ignoreDifferences": [
      {
        "group": "",
        "jsonPointers": [
          "/data"
        ],
        "kind": "Secret",
        "name": "backstage-postgresql",
        "namespace": "backstage"
      }
    ],
    "project": "default",
    "source": {
      "chart": "backstage",
      "helm": {
        "values": "backstage:\n  image:\n    registry: ghcr.io\n    repository: backstage/backstage\n    tag: latest\n  appConfig:\n    app:\n      title: IDP Platform\n      baseUrl: http://localhost:7007\n    backend:\n      baseUrl: http://localhost:7007\n      cors:\n        origin: http://localhost:7007\n      database:\n        client: pg\n        connection:\n          host: ${POSTGRES_HOST}\n          port: ${POSTGRES_PORT}\n          user: ${POSTGRES_USER}\n          password: ${POSTGRES_PASSWORD}\n    auth:\n      environment: development\n      providers:\n        guest:\n          dangerouslyAllowOutsideDevelopment: true\n    integrations:\n      github:\n        - host: github.com\n          token: ${GITHUB_TOKEN}\n    kubernetes:\n      serviceLocatorMethod:\n        type: multiTenant\n      clusterLocatorMethods:\n        - type: config\n          clusters:\n            - url: https://194.58.110.52:6443\n              name: main\n              authProvider: serviceAccount\n              serviceAccountToken: ${BACKSTAGE_K8S_TOKEN}\n              skipTLSVerify: true\n      customResources:\n        - group: 'idp.example.com'\n          apiVersion: 'v1alpha1'\n          plural: 'testenvironments'\n    catalog:\n      rules:\n        - allow: [Component, System, API, Resource, Location, Template, Group, User]\n      locations:\n        - type: url\n          target: https://github.com/agud97/sre-rag/blob/main/legacy-src/platform/backstage/catalog-info.yaml\n        - type: url\n          target: https://github.com/agud97/sre-rag/blob/main/legacy-src/developer-apps/catalog/qa-environment.yaml\n        - type: url\n          target: https://github.com/agud97/sre-rag/blob/main/legacy-src/developer-apps/catalog/demo123.yaml\n    scaffolder:\n      defaultAuthor:\n        name: Backstage IDP\n        email: backstage@idp.local\n      defaultCommitMessage: \"feat: create test environment via Backstage\"\n  extraEnvVars:\n    - name: GITHUB_TOKEN\n      valueFrom:\n        secretKeyRef:\n          name: backstage-secrets\n          key: GITHUB_TOKEN\n    - name: NODE_ENV\n      value: development\n    - name: BACKSTAGE_K8S_TOKEN\n      valueFrom:\n        secretKeyRef:\n          name: backstage-secrets\n          key: K8S_SA_TOKEN\n\npostgresql:\n  enabled: true\n  image:\n    tag: \"16\"\n  auth:\n    password: \"backstage-pg-pass\"\n    username: backstage\n    database: backstage_plugin_catalog\n  primary:\n    persistence:\n      storageClass: openebs-hostpath\n      size: 5Gi\n"
      },
      "repoURL": "https://backstage.github.io/charts",
      "targetRevision": "2.6.3"
    },
    "syncPolicy": {
      "automated": {
        "prune": true,
        "selfHeal": true
      },
      "syncOptions": [
        "CreateNamespace=true"
      ]
    }
  }
}
