apiVersion: batch/v1
kind: CronJob
metadata:
  name: popeye
  namespace: kb-system
spec:
  schedule: "*/30 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: popeye
        spec:
          serviceAccountName: popeye
          restartPolicy: OnFailure
          initContainers:
            - name: popeye
              image: derailed/popeye:v0.21.1
              command:
                - /bin/sh
                - -c
                - |
                  popeye -o json > /tmp/report.raw 2>/dev/null || true
                  echo "Popeye raw: $(wc -c < /tmp/report.raw) bytes"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
            - name: extract-json
              image: python:3.11-slim
              command:
                - python3
                - -c
                - |
                  import re, sys
                  raw = open('/tmp/report.raw', 'rb').read().decode('utf-8', errors='ignore')
                  # strip ANSI escape codes
                  clean = re.sub(r'\x1b\[[0-9;]*[mGKHF]', '', raw)
                  # find start of JSON object
                  idx = clean.find('{')
                  result = clean[idx:].strip() if idx >= 0 else '{}'
                  open('/tmp/report.json', 'w').write(result)
                  print(f'Extracted JSON: {len(result)} bytes')
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          containers:
            - name: uploader
              image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
              envFrom:
                - configMapRef:
                    name: kb-stack-config
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: accessKey
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: secretKey
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  ts=$(date -u +"%Y%m%dT%H%M%SZ")
                  mc alias set local "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
                  mc mb -p "local/kb-artifacts" || true
                  mc cp "/tmp/report.json" "local/kb-artifacts/raw/popeye/${CLUSTER_ID}/${ts}/report.json"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
