apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubescape-exporter
  namespace: kb-system
spec:
  schedule: "*/30 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: kubescape-exporter
        spec:
          serviceAccountName: kubescape-exporter
          restartPolicy: OnFailure
          initContainers:
            - name: scanner
              image: quay.io/kubescape/kubescape-cli:v3.0.48
              envFrom:
                - configMapRef:
                    name: kb-stack-config
              args:
                - scan
                - framework
                - nsa
                - --format
                - json
                - --output
                - /tmp/kubescape-findings.json
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          containers:
            - name: uploader
              image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
              envFrom:
                - configMapRef:
                    name: kb-stack-config
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: accessKey
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: secretKey
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  ts=$(date -u +"%Y%m%dT%H%M%SZ")
                  mc alias set local "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
                  mc mb -p "local/kb-artifacts" || true
                  mc cp "/tmp/kubescape-findings.json" "local/kb-artifacts/raw/kubescape/${CLUSTER_ID}/${ts}/findings.json"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
