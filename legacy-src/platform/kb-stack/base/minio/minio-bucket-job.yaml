apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: kb-system
  annotations:
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: minio-create-bucket
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accessKey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretKey
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio.kb-system.svc:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb -p local/kb-artifacts || true
              mc policy set download local/kb-artifacts
