apiVersion: v1
kind: ConfigMap
metadata:
  name: embedding-svc-script
  namespace: kb-system
data:
  embed_server.py: |
    #!/usr/bin/env python3
    """Minimal OpenAI-compatible embedding server using sentence-transformers."""
    import json
    import os
    import sys
    from http.server import BaseHTTPRequestHandler, HTTPServer

    from sentence_transformers import SentenceTransformer

    MODEL_NAME = os.environ.get("EMBEDDING_MODEL", "sentence-transformers/all-MiniLM-L6-v2")
    PORT = int(os.environ.get("PORT", "7997"))

    print(f"Loading model: {MODEL_NAME}", flush=True)
    MODEL = SentenceTransformer(MODEL_NAME)
    VECTOR_SIZE = MODEL.get_sentence_embedding_dimension()
    print(f"Model ready. vector_size={VECTOR_SIZE}", flush=True)


    class EmbedHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                body = json.dumps({"status": "ok", "vector_size": VECTOR_SIZE}).encode()
                self._json(200, body)
            else:
                self.send_response(404)
                self.end_headers()

        def do_POST(self):
            if self.path == "/v1/embeddings":
                length = int(self.headers.get("Content-Length", 0))
                raw = self.rfile.read(length)
                req = json.loads(raw)
                inp = req.get("input", "")
                texts = inp if isinstance(inp, list) else [inp]
                vecs = MODEL.encode(texts, normalize_embeddings=True).tolist()
                resp = {
                    "object": "list",
                    "data": [
                        {"object": "embedding", "index": i, "embedding": v}
                        for i, v in enumerate(vecs)
                    ],
                    "model": MODEL_NAME,
                    "usage": {
                        "prompt_tokens": sum(len(t.split()) for t in texts),
                        "total_tokens": sum(len(t.split()) for t in texts),
                    },
                }
                self._json(200, json.dumps(resp).encode())
            else:
                self.send_response(404)
                self.end_headers()

        def _json(self, code, body):
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            print(f"[HTTP] {fmt % args}", flush=True)


    if __name__ == "__main__":
        server = HTTPServer(("0.0.0.0", PORT), EmbedHandler)
        print(f"Listening on :{PORT}", flush=True)
        server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-svc
  namespace: kb-system
  labels:
    app: embedding-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-svc
  template:
    metadata:
      labels:
        app: embedding-svc
    spec:
      restartPolicy: Always
      containers:
        - name: embedding-svc
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir sentence-transformers -q
              python /server/embed_server.py
          ports:
            - containerPort: 7997
          env:
            - name: EMBEDDING_MODEL
              value: "sentence-transformers/all-MiniLM-L6-v2"
            - name: PORT
              value: "7997"
          volumeMounts:
            - name: script
              mountPath: /server
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          startupProbe:
            httpGet:
              path: /health
              port: 7997
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 7997
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 7997
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: script
          configMap:
            name: embedding-svc-script
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-svc
  namespace: kb-system
spec:
  selector:
    app: embedding-svc
  ports:
    - port: 7997
      targetPort: 7997
