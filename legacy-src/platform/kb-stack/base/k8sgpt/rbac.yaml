apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgpt-exporter-sa
  namespace: kb-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8sgpt-results-reader
rules:
  - apiGroups: ["core.k8sgpt.ai"]
    resources: ["results"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8sgpt-exporter-binding
subjects:
  - kind: ServiceAccount
    name: k8sgpt-exporter-sa
    namespace: kb-system
roleRef:
  kind: ClusterRole
  name: k8sgpt-results-reader
  apiGroup: rbac.authorization.k8s.io
