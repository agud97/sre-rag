apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-kb-tools
  namespace: kb-system
data:
  tools.yaml: |
    tools:
      - name: kb_search
        description: Search KB documents in Qdrant
        type: http
        method: POST
        url: ${QDRANT_ENDPOINT}/collections/kb_docs_${CLUSTER_ID}/points/search
        headers:
          Content-Type: application/json
        body:
          vector: [0.0]
          limit: 10
          with_payload: true
      - name: kb_fetch_artifact
        description: Fetch artifact from MinIO
        type: http
        method: GET
        url: ${MINIO_ENDPOINT}/kb-artifacts/${artifact_path}
