apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-runbooks
  namespace: holmesgpt
data:
  sre-runbooks.yaml: |
    runbooks:
      - match:
          issue_name: ".*"
        instructions: |
          –Ю–С–©–Ш–Щ WORKFLOW:

          1. –Я–Ю–Ш–°–Ъ –Т –С–Р–Ч–Х –Ч–Э–Р–Э–Ш–Щ:
             - search_runbooks —Б –Њ–њ–Є—Б–∞–љ–Є–µ–Љ –њ—А–Њ–±–ї–µ–Љ—Л
             - search_incident_history –і–ї—П –њ–Њ—Е–Њ–ґ–Є—Е –Є–љ—Ж–Є–і–µ–љ—В–Њ–≤

          2. –°–С–Ю–† –Ф–Р–Э–Э–Ђ–• (–±–µ–Ј –њ–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є—П):
             - kubectl get pods -n {{ namespace }}
             - kubectl describe pod <pod>
             - kubectl logs <pod> --tail=100
             - –Ч–∞–њ—А–Њ—Б –Љ–µ—В—А–Є–Ї —З–µ—А–µ–Ј prometheus/metrics
             - –Ч–∞–њ—А–Њ—Б –ї–Њ–≥–Њ–≤ —З–µ—А–µ–Ј victorialogs/logs

          3. –Я–†–Х–Ф–Ы–Ю–Ц–Х–Э–Ш–Х –Ф–Х–Щ–°–Ґ–Т–Ш–Щ (—Б –њ–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є–µ–Љ):
             –Я–µ—А–µ–і –ї—О–±–Њ–є –Є–Ј–Љ–µ–љ—П—О—Й–µ–є –Ї–Њ–Љ–∞–љ–і–Њ–є –Ј–∞–њ—А–Њ—Б–Є—В—М –њ–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є–µ

      - match:
          issue_name: ".*OOMKilled.*|.*OutOfMemory.*|.*memory.*exceeded.*|.*HighMemory.*"
        instructions: |
          –†–Р–°–°–Ы–Х–Ф–Ю–Т–Р–Э–Ш–Х OOM:

          1. –Я–Ю–Ш–°–Ъ –Т –С–Р–Ч–Х –Ч–Э–Р–Э–Ш–Щ:
             - search_runbooks("OOMKilled memory")

          2. –°–С–Ю–† –Ф–Р–Э–Э–Ђ–•:
             - kubectl describe pod <pod> -n {{ namespace }}
             - kubectl top pods -n {{ namespace }} --sort-by=memory
             - –Ь–µ—В—А–Є–Ї–Є: container_memory_working_set_bytes{namespace="{{ namespace }}"}
             - –Ы–Њ–≥–Є: "out of memory" OR "OOMKilled"

          3. –Р–Э–Р–Ы–Ш–Ч:
             - –°—А–∞–≤–љ–Є—В—М usage —Б limits
             - kube_pod_container_resource_limits{resource="memory"}

          4. –Я–†–Х–Ф–Ы–Ю–Ц–Х–Э–Ш–Х (—Б –њ–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є–µ–Љ):
             "–Э–∞–є–і–µ–љ OOMKilled. –£–≤–µ–ї–Є—З–Є—В—М memory limit?"

      - match:
          issue_name: ".*CrashLoopBackOff.*|.*crash.*loop.*"
        instructions: |
          –†–Р–°–°–Ы–Х–Ф–Ю–Т–Р–Э–Ш–Х CrashLoopBackOff:

          1. –Я–Ю–Ш–°–Ъ –Т –С–Р–Ч–Х –Ч–Э–Р–Э–Ш–Щ:
             - search_runbooks("CrashLoopBackOff")

          2. –°–С–Ю–† –Ф–Р–Э–Э–Ђ–•:
             - kubectl describe pod <pod> -n {{ namespace }}
             - kubectl logs <pod> -n {{ namespace }} --previous
             - –Ы–Њ–≥–Є —З–µ—А–µ–Ј VictoriaLogs: error logs for pod

          3. –Р–Э–Р–Ы–Ш–Ч Exit Code:
             - Exit 0: –Я—А–Њ–≤–µ—А–Є—В—М –Ї–Њ–Љ–∞–љ–і—Г –Ј–∞–њ—Г—Б–Ї–∞
             - Exit 1: –Р–љ–∞–ї–Є–Ј –ї–Њ–≥–Њ–≤ –њ—А–Є–ї–Њ–ґ–µ–љ–Є—П
             - Exit 137: OOMKilled
             - Exit 139: Segmentation fault

      - match:
          issue_name: ".*HighCPU.*|.*CPUThrottling.*|.*cpu.*throttl.*"
        instructions: |
          –†–Р–°–°–Ы–Х–Ф–Ю–Т–Р–Э–Ш–Х CPU:

          1. –Ь–µ—В—А–Є–Ї–Є —З–µ—А–µ–Ј prometheus/metrics:
             - container_cpu_usage_seconds_total
             - container_cpu_cfs_throttled_periods_total

          2. kubectl top pods -n {{ namespace }} --sort-by=cpu

          3. –†–∞—Б—Б—З–Є—В–∞—В—М throttling rate

      - match:
          issue_name: ".*5xx.*|.*502.*|.*503.*|.*504.*|.*gateway.*timeout.*"
        instructions: |
          –†–Р–°–°–Ы–Х–Ф–Ю–Т–Р–Э–Ш–Х HTTP –Њ—И–Є–±–Њ–Ї:

          1. –Ы–Њ–≥–Є —З–µ—А–µ–Ј VictoriaLogs:
             - –§–Є–ї—М—В—А: "500" OR "502" OR "503" OR "504"

          2. –Ь–µ—В—А–Є–Ї–Є nginx/ingress:
             - nginx_ingress_controller_requests{status=~"5.."}

          3. –Я—А–Њ–≤–µ—А–Є—В—М upstream –њ–Њ–і—Л:
             - kubectl get pods -l app=<service>

      - match:
          issue_name: ".*disk.*|.*volume.*|.*pvc.*|.*storage.*|.*no.*space.*"
        instructions: |
          –†–Р–°–°–Ы–Х–Ф–Ю–Т–Р–Э–Ш–Х DISK:

          1. –Ь–µ—В—А–Є–Ї–Є PVC:
             - kubelet_volume_stats_used_bytes
             - kubelet_volume_stats_capacity_bytes

          2. kubectl get pvc -n {{ namespace }}

          3. –Ы–Њ–≥–Є: "no space left on device"

      - match:
          issue_name: ".*node.*not.*ready.*|.*NodeNotReady.*|.*node.*down.*"
        instructions: |
          –†–Р–°–°–Ы–Х–Ф–Ю–Т–Р–Э–Ш–Х NODE:

          1. kubectl get nodes -o wide
          2. kubectl describe node <node-name>
          3. –Ь–µ—В—А–Є–Ї–Є: kube_node_status_condition, node_memory_MemAvailable_bytes

      - match:
          issue_name: ".*tailscale.*|.*llm-proxy.*|.*vpn.*"
        instructions: |
          This issue may be related to the Tailscale VPN tunnel.
          Check:
          1. Verify TS_USERSPACE is set to false in llm-proxy deployment.
          2. Check if tailscale0 interface exists.
          3. Run tailscale status to check peer connectivity.
          4. If nginx shows upstream timed out, the tailscale tunnel is broken.

      - match:
          issue_name: ".*holmesgpt.*|.*litellm.*|.*openai.*|.*lmstudio.*"
        instructions: |
          LLM connectivity chain: holmesgpt -> llm-proxy (nginx) -> tailscale -> laptop (LMStudio).
          Check:
          1. OPENAI_API_BASE env var in holmesgpt.
          2. llm-proxy connectivity.
          3. tailscale0 interface.
          4. If 403 unsupported_country error, litellm hits real OpenAI.
