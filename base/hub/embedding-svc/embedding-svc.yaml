apiVersion: v1
kind: ConfigMap
metadata:
  name: embedding-svc-script
  namespace: sre-system
data:
  server.py: |
    import json
    import os
    from http.server import BaseHTTPRequestHandler, HTTPServer

    from sentence_transformers import SentenceTransformer

    MODEL_NAME = os.environ.get("EMBEDDING_MODEL", "intfloat/multilingual-e5-large-instruct")
    PORT = int(os.environ.get("PORT", "7997"))

    print(f"Loading embedding model: {MODEL_NAME}", flush=True)
    MODEL = SentenceTransformer(MODEL_NAME)
    VECTOR_SIZE = MODEL.get_sentence_embedding_dimension()
    print(f"Embedding model ready. vector_size={VECTOR_SIZE}", flush=True)

    def embed_texts(texts):
      return MODEL.encode(texts, normalize_embeddings=True).tolist()

    class Handler(BaseHTTPRequestHandler):
      def _send(self, status, payload):
        body = json.dumps(payload).encode("utf-8")
        self.send_response(status)
        self.send_header("Content-Type", "application/json")
        self.send_header("Content-Length", str(len(body)))
        self.end_headers()
        self.wfile.write(body)

      def do_GET(self):
        if self.path == "/health":
          self._send(200, {"status": "ok", "model": MODEL_NAME, "vector_size": VECTOR_SIZE})
          return
        self._send(404, {"error": "not found"})

      def do_POST(self):
        if self.path not in ("/embed", "/v1/embeddings"):
          self._send(404, {"error": "not found"})
          return
        length = int(self.headers.get("Content-Length", "0"))
        body = self.rfile.read(length)
        payload = json.loads(body or b"{}")
        if self.path == "/embed":
          texts = payload.get("texts", [])
          self._send(200, {"vectors": embed_texts(texts)})
          return
        texts = payload.get("input", [])
        texts = texts if isinstance(texts, list) else [texts]
        vectors = embed_texts(texts)
        self._send(
          200,
          {
            "object": "list",
            "data": [
              {"object": "embedding", "index": idx, "embedding": vector}
              for idx, vector in enumerate(vectors)
            ],
            "model": MODEL_NAME,
            "usage": {
              "prompt_tokens": sum(len(text.split()) for text in texts),
              "total_tokens": sum(len(text.split()) for text in texts),
            },
          },
        )

      def log_message(self, fmt, *args):
        print(f"[HTTP] {fmt % args}", flush=True)

    if __name__ == "__main__":
      HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-svc
  namespace: sre-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-svc
  template:
    metadata:
      labels:
        app: embedding-svc
    spec:
      tolerations:
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        node.kubernetes.io/instance-type: c8-m16384-d120-hp
      containers:
        - name: server
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              python -m pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch >/tmp/pip-torch.log 2>&1
              python -m pip install --no-cache-dir sentence-transformers >/tmp/pip.log 2>&1
              python /app/server.py
          env:
            - name: EMBEDDING_MODEL
              value: "intfloat/multilingual-e5-large-instruct"
            - name: PORT
              value: "7997"
          ports:
            - containerPort: 7997
          startupProbe:
            httpGet:
              path: /health
              port: 7997
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 7997
          livenessProbe:
            httpGet:
              path: /health
              port: 7997
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 12Gi
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: embedding-svc-script
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-svc
  namespace: sre-system
spec:
  selector:
    app: embedding-svc
  ports:
    - name: http
      port: 7997
      targetPort: 7997
