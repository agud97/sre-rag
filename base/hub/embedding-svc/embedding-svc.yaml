apiVersion: v1
kind: ConfigMap
metadata:
  name: embedding-svc-script
  namespace: sre-system
data:
  server.py: |
    import hashlib
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    VECTOR_SIZE = 384

    def embed_text(text):
      digest = hashlib.sha256(text.encode("utf-8")).digest()
      values = []
      seed = digest
      while len(values) < VECTOR_SIZE:
        seed = hashlib.sha256(seed).digest()
        for byte in seed:
          values.append((byte / 255.0) - 0.5)
          if len(values) == VECTOR_SIZE:
            break
      return values

    class Handler(BaseHTTPRequestHandler):
      def _send(self, status, payload):
        body = json.dumps(payload).encode("utf-8")
        self.send_response(status)
        self.send_header("Content-Type", "application/json")
        self.send_header("Content-Length", str(len(body)))
        self.end_headers()
        self.wfile.write(body)

      def do_GET(self):
        if self.path == "/health":
          self._send(200, {"status": "ok", "vector_size": VECTOR_SIZE})
          return
        self._send(404, {"error": "not found"})

      def do_POST(self):
        if self.path != "/embed":
          self._send(404, {"error": "not found"})
          return
        length = int(self.headers.get("Content-Length", "0"))
        body = self.rfile.read(length)
        payload = json.loads(body or b"{}")
        texts = payload.get("texts", [])
        self._send(200, {"vectors": [embed_text(text) for text in texts]})

    if __name__ == "__main__":
      HTTPServer(("0.0.0.0", 7997), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-svc
  namespace: sre-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-svc
  template:
    metadata:
      labels:
        app: embedding-svc
    spec:
      tolerations:
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      containers:
        - name: server
          image: python:3.11-slim
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 7997
          readinessProbe:
            httpGet:
              path: /health
              port: 7997
          livenessProbe:
            httpGet:
              path: /health
              port: 7997
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: embedding-svc-script
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-svc
  namespace: sre-system
spec:
  selector:
    app: embedding-svc
  ports:
    - name: http
      port: 7997
      targetPort: 7997
