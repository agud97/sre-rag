apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8sgpt-exporter
  namespace: sre-exporters
spec:
  schedule: "29 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: k8sgpt-exporter
          restartPolicy: Never
          volumes:
            - name: shared
              emptyDir: {}
          initContainers:
            - name: collect-results
              image: bitnami/kubectl:1.30
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  if kubectl get results.core.k8sgpt.ai -A -o json > /shared/results.json; then
                    exit 0
                  fi
                  printf '{"error":"k8sgpt results collection failed","tool":"k8sgpt","items":[]}\n' > /shared/results.json
              volumeMounts:
                - name: shared
                  mountPath: /shared
          containers:
            - name: uploader
              image: amazon/aws-cli:2.15.40
              envFrom:
                - configMapRef:
                    name: sre-rag-config
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: accessKeyId
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: secretAccessKey
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  ts=$(date -u +"%Y%m%dT%H%M%SZ")
                  aws s3 cp /shared/results.json \
                    "s3://${S3_BUCKET}/raw/k8sgpt/${CLUSTER_ID}/${ts}/results.json" \
                    --endpoint-url "${S3_ENDPOINT}"
              volumeMounts:
                - name: shared
                  mountPath: /shared
