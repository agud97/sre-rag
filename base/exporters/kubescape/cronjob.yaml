apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubescape-exporter
  namespace: sre-exporters
spec:
  schedule: "17 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: kubescape-exporter
          restartPolicy: Never
          volumes:
            - name: shared
              emptyDir: {}
          initContainers:
            - name: kubescape
              image: quay.io/kubescape/kubescape:v3.0.31
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  if kubescape scan framework nsa --format json --output /shared/findings.json; then
                    exit 0
                  fi
                  printf '{"error":"kubescape scan failed","tool":"kubescape"}\n' > /shared/findings.json
              volumeMounts:
                - name: shared
                  mountPath: /shared
          containers:
            - name: uploader
              image: amazon/aws-cli:2.15.40
              envFrom:
                - configMapRef:
                    name: sre-rag-config
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: accessKeyId
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: secretAccessKey
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  ts=$(date -u +"%Y%m%dT%H%M%SZ")
                  aws s3 cp /shared/findings.json \
                    "s3://${S3_BUCKET}/raw/kubescape/${CLUSTER_ID}/${ts}/findings.json" \
                    --endpoint-url "${S3_ENDPOINT}"
              volumeMounts:
                - name: shared
                  mountPath: /shared
